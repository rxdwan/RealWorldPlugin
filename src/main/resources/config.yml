jail:
  location:
    world: "world"
    x: 0.0
    y: 64.0
    z: 0.0
  exit_location:
    world: "world"
    x: 10.0
    y: 64.0
    z: 0.0
  bail_amount: 8000.0
  
  allowed_commands:
  # Write the commands allowed to the players inside the jail here
    - "/bail"
    - "/msg"
    - "/r"
    - "/reply"
    - "/bal"
    - "/pay"
    - "/wantedlist"

crime:
  bounty_increment: 1000.0
  crimes:
    # Define your server's crimes here. Admins charge these via /chargecrime
    theft:
      enabled: false
      bounty: 2000.0
    assault:
      enabled: false
      bounty: 3000.0
    vandalism:
      enabled: false
      bounty: 1500.0

